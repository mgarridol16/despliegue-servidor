name: Code Quality & Linting

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

env:
  VALIDATE_ALL_CODEBASE: false
  DEFAULT_BRANCH: main
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  validate-yaml:
    name: Validate YAML Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate docker-compose.yml
        run: |
          if [ -f "docker-compose.yml" ]; then
            docker run --rm -v $(pwd):/data alpine:latest /bin/sh -c \
              'if ! which docker >/dev/null 2>&1; then apk add --no-cache docker-cli; fi && \
               docker compose -f /data/docker-compose.yml config -q'
            echo "✅ docker-compose.yml syntax is valid"
          fi

      - name: Validate all YAML files
        run: |
          # Buscar conflictos YAML comunes
          set +e

          # Validar formato YAML básico
          find . -name "*.yml" -o -name "*.yaml" | while read file; do
            if [[ "$file" == "./.git"* ]]; then continue; fi
            echo "Checking $file..."
            python3 -c "import yaml; yaml.safe_load(open('$file'))" 2>&1 || echo "❌ YAML error in $file"
          done

          echo "✅ YAML validation complete"

  lint-scripts:
    name: Lint Bash & Shell Scripts
    runs-on: ubuntu-latest
    needs: validate-yaml
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run ShellCheck
        run: |
          apt-get update && apt-get install -y shellcheck

          # Encontrar y validar scripts bash
          status=0
          find . -type f \( -name "*.sh" -o -name "*_deploy" -o -name "crear*" \) | while read script; do
            if [[ "$script" == "./.git"* ]]; then continue; fi
            echo "🔍 Checking $script..."

            # Verificar que tiene shebang
            if ! head -1 "$script" | grep -q "^#!"; then
              echo "⚠️  Missing shebang in $script"
              status=1
            fi

            # Ejecutar shellcheck
            shellcheck -S warning "$script" || status=1
          done

          [ $status -eq 0 ] && echo "✅ All scripts passed shellcheck" || exit 1

      - name: Run Super-Linter
        uses: github/super-linter@v5
        env:
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Solo validar tipos específicos
          VALIDATE_YAML: true
          VALIDATE_BASH: true
          VALIDATE_JSON: true
          VALIDATE_MARKDOWN: false
          VALIDATE_SHELL_SHFMT: true

  validate-credentials:
    name: Validate Required Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Check Docker Hub credentials
        run: |
          echo "Checking Docker Hub credentials..."

          if [ -z "${{ secrets.DOCKER_HUB_USERNAME }}" ]; then
            echo "❌ Error: DOCKER_HUB_USERNAME secret is not set"
            exit 1
          fi

          TRIMMED_USERNAME=$(echo "${{ secrets.DOCKER_HUB_USERNAME }}" | xargs)
          if [ -z "$TRIMMED_USERNAME" ]; then
            echo "❌ Error: DOCKER_HUB_USERNAME is empty or whitespace"
            exit 1
          fi

          if [ -z "${{ secrets.DOCKER_HUB_TOKEN }}" ]; then
            echo "⚠️  Warning: DOCKER_HUB_TOKEN secret is not set (needed for push)"
          fi

          echo "✅ Credentials validation passed"
          echo "  Username: ${TRIMMED_USERNAME:0:3}***"
          echo "  Token configured: $([ -z '${{ secrets.DOCKER_HUB_TOKEN }}' ] && echo 'NO' || echo 'YES')"

  summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [ validate-yaml, lint-scripts, validate-credentials ]
    steps:
      - name: Report validation status
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 Validation Pipeline Summary"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # Determinar estado general
          if [ "${{ needs.validate-yaml.result }}" == "failure" ] || \
             [ "${{ needs.lint-scripts.result }}" == "failure" ] || \
             [ "${{ needs.validate-credentials.result }}" == "failure" ]; then
            echo "❌ VALIDATION FAILED - Please fix errors above"
            exit 1
          else
            echo "✅ ALL VALIDATIONS PASSED"
            echo ""
            echo "Next: Proceed to Security Scan & Build"
          fi
