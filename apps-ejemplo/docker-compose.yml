version: '3.8'

services:
  # ═══════════════════════════════════════════════════════════════════════════
  # EJEMPLO DE APP SIMPLE (NGINX)
  # ═══════════════════════════════════════════════════════════════════════════
  # Esta es una aplicación de prueba que simula una web simple.
  # Replácela con tu propio docker-compose.yml.
  #
  # IMPORTANTE:
  #   1. El nombre del servicio puede ser cualquiera (aquí: web-test)
  #   2. VIRTUAL_HOST determina el subdominio (p.ej: miapp.mi-dominio.com)
  #   3. LETSENCRYPT_HOST activa certificado SSL automático
  #   4. Usa la red EXTERNA "net_proxy" (definida en plataforma/)
  #
  web-test:
    image: nginx:alpine
    container_name: app-profesor
    restart: always
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
    environment:
      # Detectados automáticamente por nginx-proxy + acme-companion
      - VIRTUAL_HOST=profesor.${MAIN_DOMAIN}
      - VIRTUAL_PORT=80
      - LETSENCRYPT_HOST=profesor.${MAIN_DOMAIN}
      - LETSENCRYPT_EMAIL=${ACME_EMAIL}
    networks:
      - net_proxy  # Red externa del proxy (cambiada v2.0)
    restart: always

networks:
  # Red externa: debe existir previamente (creada por docker-compose principal)
  # Ver: crear_usuario_deploy.sh que ejecuta "docker network create net_proxy"
  net_proxy:
    external: true
    name: net_proxy
