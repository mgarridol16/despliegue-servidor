networks:
  net_proxy:
    external: true
  net_monitor:
    external: true

services:
  # ═══════════════════════════════════════════════════════════════════════════
  # PROXY INVERSO (Sin SSL local)
  # ════════════════════════════════════════════════════════════════════════════
  nginx-proxy:
    image: jwilder/nginx-proxy:latest
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
    environment:
      # Adaptado a la nueva nomenclatura con guiones
      - DEFAULT_HOST=${USERNAME}-grafana.${MAIN_DOMAIN}
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      # 1. Inyectamos tu configuración de métricas
      - ./nginx/conf.d/metrics.conf:/etc/nginx/conf.d/metrics.conf:ro
      # 2. Inyectamos tus optimizaciones globales (timeouts, buffers, hash bucket)
      - ./nginx/proxy-conf.d/custom.conf:/etc/nginx/conf.d/custom.conf:ro
    networks:
      - net_proxy
      - net_monitor

  # ═══════════════════════════════════════════════════════════════════════════
  # GESTIÓN DE CONTENEDORES
  # ═══════════════════════════════════════════════════════════════════════════
  portainer:
    image: portainer/portainer-ce:${PORTAINER_VERSION}
    container_name: portainer
    restart: unless-stopped
    command: -H unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    environment:
      - VIRTUAL_HOST=${USERNAME}-portainer.${MAIN_DOMAIN}
      - VIRTUAL_PORT=9000
    networks:
      - net_proxy

  # ═══════════════════════════════════════════════════════════════════════════
  # MONITORIZACIÓN: PROMETHEUS + EXPORTERS
  # ═══════════════════════════════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION}
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    environment:
      - VIRTUAL_HOST=${USERNAME}-prometheus.${MAIN_DOMAIN}
      - VIRTUAL_PORT=9090
    networks:
      - net_monitor
      - net_proxy

  # Recolector de métricas del host
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - net_monitor

  # Monitorización de nginx-proxy
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: nginx-exporter
    restart: unless-stopped
    command:
      # Apunta al stub_status interno que configuraste en metrics.conf
      - '-nginx.scrape-uri=http://nginx-proxy/stub_status'
    networks:
      - net_monitor
      - net_proxy
    depends_on:
      - nginx-proxy

  # ═══════════════════════════════════════════════════════════════════════════
  # GRAFANA: DASHBOARDS Y VISUALIZACIÓN
  # ═══════════════════════════════════════════════════════════════════════════
  # Init container: Arregla permisos de Grafana antes de iniciar
  fix-grafana-perms:
    image: alpine:latest
    container_name: fix-grafana-perms
    command: chown -R 472:472 /var/lib/grafana
    volumes:
      - grafana_data:/var/lib/grafana
    network_mode: none

  # Grafana UI
  grafana:
    image: grafana/grafana:${GRAFANA_VERSION}
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      # Ajustamos la URL root para que confíe en la cabecera HTTPS del proxy superior
      - GF_SERVER_ROOT_URL=https://${USERNAME}-grafana.${MAIN_DOMAIN}
      - GF_SERVER_DOMAIN=${USERNAME}-grafana.${MAIN_DOMAIN}
      - VIRTUAL_HOST=${USERNAME}-grafana.${MAIN_DOMAIN}
      - VIRTUAL_PORT=3000
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      fix-grafana-perms:
        condition: service_completed_successfully
    networks:
      - net_monitor
      - net_proxy

volumes:
  portainer_data:
  grafana_data:
  prometheus_data:
