# =====================================================================
# EXPOSICIÓN DE MÉTRICAS PARA PROMETHEUS
# =====================================================================
# Este bloque permite que nginx-exporter lea el estado del proxy.
# El enrutamiento de apps (Grafana, Portainer) lo hace jwilder/nginx-proxy
# automáticamente gracias a la variable VIRTUAL_HOST.
# =====================================================================
server {
    listen 80;
    server_name localhost;

    location /stub_status {
        stub_status on;
        allow all;
    }
}
