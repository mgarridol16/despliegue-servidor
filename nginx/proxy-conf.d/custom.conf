# ═══════════════════════════════════════════════════════════════════════════════
# CONFIGURACIÓN PERSONALIZADA DE NGINX PROXY
# ═══════════════════════════════════════════════════════════════════════════════
# Este archivo permite ajustes globales de Nginx que se aplican a TODAS las apps.
# NO es necesario editar este archivo para añadir nuevas aplicaciones.
# Las apps simplemente definen VIRTUAL_HOST y listo.
#

# ─────────────────────────────────────────────────────────────────────────────
# BUFFER Y TIMEOUTS (Para apps grandes)
# ─────────────────────────────────────────────────────────────────────────────
proxy_connect_timeout 600s;
proxy_send_timeout 600s;
proxy_read_timeout 600s;
send_timeout 600s;

# ─────────────────────────────────────────────────────────────────────────────
# BUFFERS (Para aplicaciones que devuelven payloads grandes)
# ─────────────────────────────────────────────────────────────────────────────
proxy_buffer_size 128k;
proxy_buffers 4 256k;
proxy_busy_buffers_size 256k;

# ─────────────────────────────────────────────────────────────────────────────
# DNS Y VIRTUAL HOSTS
# ─────────────────────────────────────────────────────────────────────────────
server_names_hash_bucket_size 128;
resolver 8.8.8.8 8.8.4.4 valid=300s;
resolver_timeout 5s;
