# ==============================================================================
# CONFIGURACIÓN DE ESTADO NGINX (STUB_STATUS)
# ==============================================================================
# Este archivo habilita la API de métricas internas de Nginx.
# El 'nginx-exporter' lee este endpoint para contar las peticiones activas.

server {
    listen 80;
    server_name localhost;

    # Endpoint expuesto para la monitorización
    location /stub_status {
        # Habilita el módulo de estado de Nginx
        stub_status on;

        # Control de acceso (Security Hardening):
        # Permitimos el acceso solo desde localhost y la red interna de Docker (172.0.0.0/8)
        allow 127.0.0.1;
        allow 172.0.0.0/8;

        # Denegamos cualquier otra conexión externa por seguridad
        deny all;
    }
}
